name: build-packages
on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release and upload artifacts"
        required: false
        default: "false"
        type: boolean
      release_tag:
        description: "Release tag (e.g. v1.0.0) when create_release=true"
        required: false
        type: string
      release_name:
        description: "Release name (optional)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: "pnpm-lock.yaml"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install WiX
        if: matrix.os == 'windows-latest'
        run: choco install -y wixtoolset

      - name: Install deps
        run: pnpm install

      - name: Fetch bins (Windows x64)
        if: matrix.os == 'windows-latest'
        run: $env:BIN_DOWNLOAD="1"; pnpm run install-bins

      - name: Fetch bins (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm run install-bins

      - name: Build bundles
        run: pnpm exec tauri build --bundles ${{ matrix.os == 'windows-latest' && 'nsis,msi' || 'dmg' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "reaction-cut-rust-${{ matrix.os }}-${{ runner.arch }}"
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.create_release == true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Validate release inputs
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.release_tag == ''
        run: |
          Write-Error "release_tag is required when create_release=true"
          exit 1
      - name: Package release zips
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TAG" ]; then
            echo "missing release tag"
            exit 1
          fi
          mkdir -p dist/release-zips
          windows_dirs=(dist/reaction-cut-rust-windows-latest-*)
          macos_dirs=(dist/reaction-cut-rust-macos-latest-*)
          if [ ! -d "${windows_dirs[0]}" ]; then
            echo "missing windows artifacts"
            exit 1
          fi
          if [ ! -d "${macos_dirs[0]}" ]; then
            echo "missing macos artifacts"
            exit 1
          fi
          for dir in "${windows_dirs[@]}"; do
            arch="${dir##*-}"
            arch_lower="$(echo "$arch" | tr '[:upper:]' '[:lower:]')"
            zip -r "dist/release-zips/reaction-cut-rust-${RELEASE_TAG}-windows-${arch_lower}.zip" "$dir"
          done
          for dir in "${macos_dirs[@]}"; do
            arch="${dir##*-}"
            arch_lower="$(echo "$arch" | tr '[:upper:]' '[:lower:]')"
            zip -r "dist/release-zips/reaction-cut-rust-${RELEASE_TAG}-macos-${arch_lower}.zip" "$dir"
          done

      - name: Publish release (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: dist/release-zips/*.zip

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
      - name: Sync app version from git tag
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#v}"
          if [ -z "${VERSION}" ]; then
            echo "invalid tag: ${RAW_TAG}"
            exit 1
          fi
          pnpm run version:bump -- "${VERSION}"
          echo "Version synced from tag: ${RAW_TAG} -> ${VERSION}"
      - name: Install dependencies
        run: pnpm install
      - name: Build DMG
        run: pnpm tauri build --bundles dmg
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
